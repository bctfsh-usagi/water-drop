<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
* { box-sizing: border-box; margin: 0; }
html, body { height: 100%; background: #D8EEF5; }
body {
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}
.wrap {
  position: relative; z-index: 1;
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
  background: linear-gradient(175deg, #EAF7FB 0%, #D8EEF5 60%, #CDE8F1 100%);
  font-family: 'Jua', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: #2A4A66; gap: 14px; overflow: hidden;
  padding: calc(16px + env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
}
/* ---------- 배경 장식 ---------- */
.bgdeco { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bgdeco svg { position: absolute; }
.deco-cloud1 { width: 150px; top: 4%; left: -30px; opacity: .8; animation: drift 34s linear infinite; }
.deco-cloud2 { width: 110px; top: 12%; right: -20px; opacity: .65; animation: drift 46s linear infinite reverse; }
.deco-wave   { width: 130%; bottom: 4%; left: -15%; opacity: .5; }
.deco-bub1   { width: 44px; bottom: -60px; left: 12%; opacity: .7; animation: rise 16s linear infinite; }
.deco-bub2   { width: 30px; bottom: -60px; right: 16%; opacity: .6; animation: rise 21s linear infinite 6s; }
@keyframes drift { from { transform: translateX(0); } to { transform: translateX(60px); } }
@keyframes rise { from { transform: translateY(0); } to { transform: translateY(-110dvh); } }
.wrap > *:not(.bgdeco) { position: relative; z-index: 1; }
/* ---------- 상단 ---------- */
.top { width: min(92vw, 420px); }
.title-row { display: flex; align-items: flex-end; gap: 8px; }
.logo svg { width: 200px; height: auto; display: block; }
.lv-name { color: #7BA2B8; font-size: 15px; padding-bottom: 8px; }
.stats { display: flex; align-items: center; gap: 14px; margin-top: 4px; font-size: 15px; color: #5C86A0; }
.stats b { color: #FF8B94; font-weight: 400; }
.icon-btn {
  background: #fff; border: 1.5px solid #BFE0EC;
  border-radius: 50%; width: 38px; height: 38px; padding: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn svg { width: 100%; height: 100%; }
.icon-btn:active { border-color: #FF8B94; }
.icon-btn.push { margin-left: auto; }
/* ---------- 보드 ---------- */
.board-outer { position: relative; }
.board {
  width: min(92vw, 420px); aspect-ratio: 1; display: grid;
  grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 8px; padding: 12px;
  background: #FBFEFF; border-radius: 26px;
  box-shadow: 0 8px 24px rgba(83, 144, 175, .14);
}
.cell {
  position: relative; border-radius: 34%; background: #E7F4F9;
  display: flex; align-items: center; justify-content: center;
}
.cell.target { cursor: pointer; }
.targetfx { position: absolute; inset: 3%; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 50% { opacity: .45; } }
.ghost { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.ghost svg { width: 100%; height: 100%; display: block; }
/* ---------- 방울 ---------- */
.tile {
  position: relative; border: none; cursor: pointer; background: none; padding: 0;
  font-family: inherit;
  transition: transform .14s ease;
}
.dropsvg { width: 100%; height: 100%; display: block; animation: bob 3.2s ease-in-out infinite; }
.tile.sel { transform: scale(1.07); }
.tile.pop { animation: popIn .28s cubic-bezier(.3,1.6,.5,1); }
.tile.vanish { animation: vanish .34s ease forwards; pointer-events: none; }
.tile.wiggle { animation: wiggleAnim .19s ease 2; }
@keyframes bob {
  0%, 100% { transform: translateY(0) scale(1, 1); }
  50% { transform: translateY(-2.5px) scale(1.03, .97); }
}
@keyframes popIn {
  0% { transform: scale(.3, .55); }
  55% { transform: scale(1.16, .84); }
  80% { transform: scale(.94, 1.08); }
  100% { transform: scale(1); }
}
@keyframes vanish { 60% { transform: scale(1.18); } 100% { transform: scale(0); opacity: 0; } }
@keyframes wiggleAnim { 25% { transform: translateX(-3px) rotate(-4deg); } 75% { transform: translateX(3px) rotate(4deg); } }
/* ---------- 이펙트 ---------- */
.splash { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
.splash .pt {
  position: absolute; left: 50%; top: 50%;
  animation: fly .55s ease-out forwards;
}
.splash .pt svg { width: 100%; height: 100%; display: block; }
@keyframes fly {
  from { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: .95; }
  to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(.15); opacity: 0; }
}
.fxring { position: absolute; inset: 0; pointer-events: none; animation: ringOut .45s ease-out forwards; }
@keyframes ringOut {
  from { transform: scale(.35); opacity: .95; }
  to { transform: scale(1.25); opacity: 0; }
}
/* ---------- 패널 ---------- */
.panel {
  width: min(92vw, 420px); min-height: 100px; background: #FBFEFF; border-radius: 20px;
  padding: 14px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; text-align: center;
  box-shadow: 0 4px 14px rgba(83,144,175,.10);
}
.panel .hint { color: #7BA2B8; font-size: 15px; line-height: 1.55; }
.panel .ask { font-size: 16px; }
.opts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.opt {
  display: flex; align-items: center; gap: 6px;
  background: #EFF8FB; border: 1.5px solid #BFE0EC; color: #2A4A66; border-radius: 999px;
  padding: 8px 15px; font-family: inherit; font-size: 16px; cursor: pointer;
  transition: border-color .12s ease, transform .12s ease;
}
.opt:active { border-color: #FF8B94; transform: translateY(-1px); }
.opt i { width: 11px; height: 11px; border-radius: 50% 50% 50% 50% / 58% 58% 42% 42%; display: inline-block; }
.cancel { background: none; border: none; color: #7BA2B8; font-family: inherit; font-size: 14px; cursor: pointer; text-decoration: underline; }
/* ---------- 토스트/오버레이 ---------- */
.toast {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  background: #FF8B94; color: #fff; border-radius: 999px; padding: 5px 16px;
  font-size: 15px; animation: toastUp .25s ease; white-space: nowrap; z-index: 5;
  box-shadow: 0 4px 10px rgba(255,139,148,.35);
}
@keyframes toastUp { from { transform: translate(-50%, 8px); opacity: 0; } }
.overlay {
  position: absolute; inset: 0; border-radius: 26px; z-index: 10;
  background: rgba(251,254,255,.9); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px; text-align: center; padding: 20px;
}
.overlay .pdeco svg { width: 120px; height: auto; display: block; margin: 0 auto 4px; }
.overlay h2 { font-size: 25px; font-weight: 400; }
.overlay p { color: #7BA2B8; font-size: 15px; }
.big-btn {
  margin-top: 10px; background: #FF8B94; color: #fff; border: none; border-radius: 14px;
  padding: 10px 26px; font-family: inherit; font-size: 17px; cursor: pointer;
  box-shadow: 0 4px 0 #E56E78;
}
.big-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E56E78; }
/* ---------- 메인 화면 ---------- */
.home {
  position: relative; min-height: 100dvh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(175deg, #EAF7FB 0%, #D8EEF5 60%, #CDE8F1 100%);
  font-family: 'Jua', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: #2A4A66;
  padding: calc(20px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
}
.home .bgdeco { z-index: 0; }
.home-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 18px; }
.home-logo svg { width: min(74vw, 300px); height: auto; display: block; }
.home-mascot { width: min(38vw, 150px); }
.home-mascot svg { width: 100%; display: block; animation: bob 3.2s ease-in-out infinite; }
.big-btn.start { font-size: 20px; padding: 13px 46px; border-radius: 18px; }
.lv-select { display: flex; gap: 10px; }
.lv-dot {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
  font-family: inherit; font-size: 16px; color: #fff; background: #58B6DF;
  box-shadow: 0 3px 0 #3B9BD1;
}
.lv-dot:active { transform: translateY(2px); box-shadow: 0 1px 0 #3B9BD1; }
.lv-dot.lock { background: #C9DEE8; box-shadow: 0 3px 0 #B3CDD9; cursor: default; }
.best { color: #7BA2B8; font-size: 14px; }
/* ---------- 이미지 리소스 모드 ---------- */
.logo img { height: 58px; display: block; }
.home-logo img { width: min(64vw, 260px); display: block; }
.icon-btn img, .targetfx img { width: 100%; height: 100%; display: block; }
img.targetfx { position: absolute; inset: 3%; width: 94%; height: 94%; }
.bgdeco img { position: absolute; }
.pcard {
  width: min(68vw, 256px); aspect-ratio: 257 / 353;
  background-size: 100% 100%; background-repeat: no-repeat;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 30px 20px; text-align: center;
}
.pcard h2 { font-size: 20px; }
.pcard p { font-size: 14px; }
.pcard .big-btn { font-size: 15px; padding: 12px 24px; margin-top: 6px; }
button:focus-visible { outline: 3px solid #FF8B94; outline-offset: 2px; }
[hidden] { display: none !important; }
@media (prefers-reduced-motion: reduce) {
  .dropsvg, .tile.pop, .tile.vanish, .tile.wiggle, .targetfx, .toast, .splash .pt, .fxring,
  .deco-cloud1, .deco-cloud2, .deco-bub1, .deco-bub2 { animation: none; }
  .tile.vanish { opacity: 0; }
  .splash, .fxring { display: none; }
}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs id="globalDefs"></defs></svg>

<div class="home" id="homeScreen">
  <div class="bgdeco" id="bgdecoHome"></div>
  <div class="home-inner">
    <div class="home-logo" id="homeLogo"></div>
    <div class="home-mascot" id="homeMascot"></div>
    <button class="big-btn start" id="startBtn">시작하기</button>
    <p class="best" id="bestEl" hidden></p>
  </div>
</div>

<div class="wrap" id="gameScreen" hidden>
  <div class="bgdeco" id="bgdeco"></div>

  <div class="top">
    <div class="title-row">
      <div class="logo" id="logoEl"></div>
      <span class="lv-name" id="lvname"></span>
    </div>
    <div class="stats">
      <span>점수 <b id="scoreEl">0</b></span>
      <span>이동 <b id="movesEl">0</b></span>
      <button class="icon-btn push" id="homeBtn" aria-label="메인 화면으로"></button>
      <button class="icon-btn" id="soundBtn" aria-label="소리 켜고 끄기"></button>
      <button class="icon-btn" id="restartBtn" aria-label="레벨 다시하기"></button>
    </div>
  </div>

  <div class="board-outer">
    <div class="toast" id="toastEl" hidden></div>
    <div class="board" id="boardEl"></div>
    <div class="overlay" id="overlayEl" hidden></div>
  </div>

  <div class="panel" id="panelEl"></div>
</div>

<script>

      }
    }
    if (grp.length >= 2) groups.push(grp);
  }
  return groups;
}

// ---------- 사운드 ----------
let audioCtx = null;
function beep(freq, dur = 0.12, slide = 0.6, gain = 0.16) {
  if (muted) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 소리 없이 계속 */ }
}

// 숫자 뱃지 (이미지 방울용 - 우상단 흰 원)

  return `<circle cx="99" cy="26" r="16" fill="#FFFFFF" stroke="#BFE0EC" stroke-width="2.5"/>
    <text x="99" y="27" text-anchor="middle" dominant-baseline="middle"
      font-family="Jua, NanumSquare, sans-serif" font-size="${fs}" font-weight="800" fill="${col}">${v}</text>`;
}

}

try { progress = Object.assign(progress, JSON.parse(localStorage.getItem(SAVE_KEY) || "{}")); } catch (e) {}

function renderHome() {
  const bestEl = document.getElementById("bestEl");

    bestEl.textContent = `최고 점수 ${progress.best}`;
  } else {

  }
}

function showHome() {
  gameEl.hidden = true;
  homeEl.hidden = false;
  renderHome();
}
function showGame(idx) {
  homeEl.hidden = true;
  gameEl.hidden = false;
  loadLevel(idx, 0);
}
function renderSoundBtn() {

    ? `<img src="${muted ? ASSETS.ui.icons.soundOff : ASSETS.ui.icons.soundOn}" alt="">`
    : `<svg viewBox="0 0 72 72">${muted ? ASSETS.icons.soundOff : ASSETS.icons.soundOn}</svg>`;
}

function buildBoard() {
  boardEl.innerHTML = "";
  cellEls = []; sigs = [];
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.addEventListener("click", () => onCellTap(i));
    boardEl.appendChild(cell);
    cellEls.push(cell);
    sigs.push(null);
  }
}

function isPlacing() { return sel != null && choice != null; }

function renderCell(i) {
  const v = grid[i];
  const isTarget = isPlacing() && v == null && nbrs(sel).includes(i);
  const sig = [v, sel === i, popping.has(i), clearing.has(i), wiggle === i, isTarget].join("|");
  if (sigs[i] === sig) return;
  sigs[i] = sig;
  const cell = cellEls[i];
  cell.className = "cell" + (isTarget ? " target" : "");
  cell.setAttribute("role", isTarget ? "button" : "");
  if (v == null) {
    if (isTarget) {
      const b = choice[1];
      const size = ASSETS.bodyImg ? Math.min(100, 58 + b * 2.6) : 96;
      const tfx = ASSETS.ui
        ? `<svg class="targetfx" viewBox="0 0 128 128"><circle cx="64" cy="64" r="51" fill="rgba(255,139,148,.06)"
             stroke="#FF8B94" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="12 14"/></svg>`
        : `<svg class="targetfx" viewBox="0 0 128 128">${ASSETS.fx.target}</svg>`;
      cell.innerHTML = `${tfx}
        <div class="ghost" style="width:${size}%;height:${size}%">${ghostSVG(b)}</div>`;
    } else {
      cell.innerHTML = "";
    }
    return;
  }
  const size = ASSETS.bodyImg ? Math.min(100, 58 + v * 2.6) : 96;
  const mood = clearing.has(i) ? "excited" : sel === i ? "selected" : v === 2 ? "sad" : v === 16 ? "boss" : "normal";
  const cls = "tile" + (sel === i ? " sel" : "") +
    (popping.has(i) ? " pop" : "") + (clearing.has(i) ? " vanish" : "") + (wiggle === i ? " wiggle" : "");
  cell.innerHTML = `<button class="${cls}" style="width:${size}%;height:${size}%">${dropSVG(v, mood, sel === i)}</button>`;
  const svg = cell.querySelector(".dropsvg");
  if (svg) svg.style.animationDelay = `-${(i % 5) * 0.55}s`;
}

function renderBoard() { for (let i = 0; i < SIZE * SIZE; i++) renderCell(i); }

function renderStats() {
  scoreEl.textContent = score;
  movesEl.textContent = moves;
  lvnameEl.textContent = `LV.${levelIdx + 1} ${LEVELS[levelIdx].name}`;
}

function renderPanel() {
  if (sel == null) {
    panelEl.innerHTML = `<div class="hint">방울을 톡 눌러 두 개로 쪼개보세요<br>같은 숫자끼리 만나면 퐁— 하고 터져요!</div>`;
    return;
  }
  const emptyNbrs = nbrs(sel).filter((n) => grid[n] == null);
  if (!choice && emptyNbrs.length === 0) {
    panelEl.innerHTML = `<div class="hint">옆에 빈 자리가 없어서 못 쪼개요…</div>`;
    return;
  }
  if (!choice) {
    const opts = splitOptions(grid[sel]).map(([a, b]) =>
      `<button class="opt" data-a="${a}" data-b="${b}">
        <i style="background:${DROP_COLOR(a)}"></i> ${a} + ${b} <i style="background:${DROP_COLOR(b)}"></i>
      </button>`).join("");
    panelEl.innerHTML = `<div class="ask">${grid[sel]}방울을 어떻게 나눌까요?</div><div class="opts">${opts}</div>`;
    panelEl.querySelectorAll(".opt").forEach((btn) => {
      btn.addEventListener("click", () => {
        choice = [+btn.dataset.a, +btn.dataset.b];
        beep(480, 0.06, 0.9, 0.09);
        renderAll();
      });
    });
    return;
  }
  panelEl.innerHTML = `<div class="ask">분홍 자리를 눌러 <b style="color:#FF8B94">${choice[1]}방울</b>을 놓아주세요</div>
    <button class="cancel">다르게 나눌래요</button>`;
  panelEl.querySelector(".cancel").addEventListener("click", () => {
    choice = null;
    renderAll();
  });
}

function renderOverlay() {
  if (status === "play") { overlayEl.hidden = true; return; }
  overlayEl.hidden = false;
  const decoKey = status === "won" ? "clear" : status === "done" ? "allclear" : "stuck";
  const deco = ASSETS.ui ? "" : `<div class="pdeco"><svg viewBox="${ASSETS.popupDecoVB}">${ASSETS.popupDeco[decoKey]}</svg></div>`;
  let html = "";
  if (status === "won") {
    html = `${deco}<h2>촤아— 판이 맑아졌어요!</h2><p>이동 ${moves}번 · 점수 ${score}</p>
      <button class="big-btn" id="nextBtn">다음 판으로</button>`;
  } else if (status === "done") {
    const bestMsg = score >= progress.best ? " · 최고 기록!" : "";
    html = `${deco}<h2>방울을 전부 터뜨렸어요!</h2><p>최종 점수 ${score}${bestMsg}</p>
      <button class="big-btn" id="nextBtn">처음부터 다시</button>`;
  } else {
    html = `${deco}<h2>으앗, 낑겨버렸어…</h2><p>더 쪼갤 자리가 없어요</p>
      <button class="big-btn" id="nextBtn">다시하기</button>`;
  }
  html += `<button class="cancel" id="homeLink">홈으로</button>`;
  overlayEl.innerHTML = ASSETS.ui
    ? `<div class="pcard" style="background-image:url(${ASSETS.ui.popup[decoKey]})">${html}</div>`
    : html;
  overlayEl.querySelector("#nextBtn").addEventListener("click", () => {
    if (status === "won") loadLevel(levelIdx + 1, score);
    else if (status === "done") loadLevel(0, 0);
    else loadLevel(levelIdx, startScore);
  });
  overlayEl.querySelector("#homeLink").addEventListener("click", showHome);
}

function renderAll() { renderBoard(); renderStats(); renderPanel(); renderOverlay(); }

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.hidden = false;
  toastEl.style.animation = "none";
  void toastEl.offsetWidth;
  toastEl.style.animation = "";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.hidden = true; }, 1300);
}

function splashAt(idx) {
  const cell = cellEls[idx];
  // 물결 링
  const ring = document.createElement("div");
  ring.className = "fxring";
  ring.innerHTML = ASSETS.ui
    ? `<img src="${ASSETS.ui.rings[Math.floor(Math.random() * ASSETS.ui.rings.length)]}" style="width:100%;height:100%;display:block" alt="">`
    : `<svg viewBox="0 0 128 128" style="width:100%;height:100%;display:block">${ASSETS.fx.splashRing}</svg>`;
  cell.appendChild(ring);
  setTimeout(() => ring.remove(), 500);
  // 파티클 (3가지 모양 랜덤)
  const wrap = document.createElement("div");
  wrap.className = "splash";
  for (let k = 0; k < 6; k++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = 24 + Math.random() * 28;
    const shape = ASSETS.ui ? null : ASSETS.fx.particles[Math.floor(Math.random() * ASSETS.fx.particles.length)];
    const d = document.createElement("div");
    d.className = "pt";
    const size = 10 + Math.random() * 10;
    d.style.width = size + "px";
    d.style.height = size + "px";
    d.style.animationDelay = (Math.random() * 0.08) + "s";
    d.style.setProperty("--dx", Math.cos(ang) * dist + "px");
    d.style.setProperty("--dy", Math.sin(ang) * dist + "px");
    d.style.setProperty("--rot", (Math.random() * 240 - 120) + "deg");
    d.innerHTML = ASSETS.ui
      ? `<img src="${ASSETS.ui.parts[Math.floor(Math.random() * ASSETS.ui.parts.length)]}" style="width:100%;height:100%;display:block" alt="">`
      : `<svg viewBox="0 0 64 64">${shape}</svg>`;
    wrap.appendChild(d);
  }
  cell.appendChild(wrap);
  setTimeout(() => wrap.remove(), 700);
}

// ---------- 게임 흐름 ----------
function loadLevel(idx, base) {
  levelIdx = idx;
  grid = makeGrid(LEVELS[idx]);
  score = base; startScore = base; moves = 0;
  sel = null; choice = null; wiggle = null; busy = false; status = "play";
  popping = new Set(); clearing = new Set();
  sigs = sigs.map(() => null);
  toastEl.hidden = true;
  renderAll();
}

function endCheck(g) {
  if (g.every((v) => v == null)) {
    status = levelIdx === LEVELS.length - 1 ? "done" : "won";
    if (status === "won") {
      progress.unlocked = Math.max(progress.unlocked, levelIdx + 2);
    } else {
      progress.best = Math.max(progress.best, score);
    }
    saveProgress();
    beep(523, 0.15, 1.0);
    setTimeout(() => beep(659, 0.15, 1.0), 100);
    setTimeout(() => beep(784, 0.22, 1.0), 200);
    renderAll();
    return;
  }
  const canMove = g.some((v, i) => v != null && v > 2 && nbrs(i).some((n) => g[n] == null));
  if (!canMove) {
    status = "stuck";
    beep(220, 0.3, 0.5);
    renderAll();
  }
}

function resolve(g) {
  const groups = findGroups(g);
  if (groups.length === 0) {
    busy = false;
    renderAll();
    endCheck(g);
    return;
  }
  const cells = groups.flat();
  clearing = new Set(cells);
  renderBoard();
  setTimeout(() => {
    let gained = 0, big = false;
    groups.forEach((grp) => {
      const v = g[grp[0]];
      gained += v * grp.length + (grp.length > 2 ? v * (grp.length - 2) : 0);
      if (grp.length >= 3) big = true;
    });
    cells.forEach((i) => (g[i] = null));
    clearing = new Set();
    score += gained;
    busy = false;
    renderAll();
    cells.forEach(splashAt);
    showToast(big ? `촤르륵! ${cells.length}방울 +${gained}` : `퐁! +${gained}`);
    beep(620, 0.14, 1.5);
    setTimeout(() => beep(930, 0.12, 1.3, 0.12), 70);
    endCheck(g);
  }, 340);
}

function doSplit(target) {
  const [a, b] = choice;
  grid[sel] = a;
  grid[target] = b;
  moves++;
  popping = new Set([sel, target]);
  sel = null; choice = null; busy = true;
  beep(340, 0.14, 0.45);
  renderAll();
  setTimeout(() => {
    popping = new Set();
    resolve(grid);
  }, 260);
}

function onCellTap(i) {
  if (busy || status !== "play") return;
  const v = grid[i];
  if (v == null) {
    if (isPlacing() && nbrs(sel).includes(i)) doSplit(i);
    return;
  }
  if (sel === i) { sel = null; choice = null; renderAll(); return; }
  if (v === 2) {
    showToast("이 방울은 더 못 쪼개요 ㅠ");
    wiggle = i;
    renderCell(i);
    setTimeout(() => { wiggle = null; renderCell(i); }, 380);
    beep(260, 0.1, 0.7, 0.1);
    return;
  }
  sel = i; choice = null;
  beep(540, 0.07, 0.85, 0.1);
  renderAll();
}

// ---------- 버튼 ----------
soundBtn.addEventListener("click", () => {
  muted = !muted;
  renderSoundBtn();
});
restartBtn.addEventListener("click", () => loadLevel(levelIdx, startScore));
homeBtn.addEventListener("click", showHome);
document.getElementById("startBtn").addEventListener("click", () => showGame(progress.unlocked - 1));
document.addEventListener("dblclick", (e) => e.preventDefault(), { passive: false });

// ---------- 시작 ----------
buildStatic();
buildBoard();
renderHome();
